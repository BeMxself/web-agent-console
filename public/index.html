<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Web Agent Console</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body data-web-agent-bootstrap="true">
    <main id="app-layout" class="layout">
      <aside id="session-list" class="panel panel-scroll"></aside>
      <div
        id="project-panel-resizer"
        class="panel-resizer"
        role="separator"
        aria-label="调整项目/会话宽度"
        aria-orientation="vertical"
      ></div>
      <section id="conversation-panel" class="panel panel-column">
        <div class="conversation-header">
          <button
            id="project-panel-toggle"
            class="panel-toggle panel-toggle--left"
            type="button"
            aria-controls="session-list"
            aria-expanded="true"
          >
            <span class="panel-toggle-icon" aria-hidden="true">‹</span>
            <span class="panel-toggle-label">项目/会话</span>
            <span class="panel-toggle-mobile-glyph" aria-hidden="true">
              <span class="panel-toggle-mobile-bar"></span>
              <span class="panel-toggle-mobile-bar"></span>
              <span class="panel-toggle-mobile-bar"></span>
            </span>
          </button>
          <div class="conversation-header-title">
            <div id="conversation-title" class="conversation-title" hidden></div>
          </div>
          <div id="conversation-status" class="conversation-status conversation-status--connected" role="status" aria-live="polite">
            <span class="conversation-status-light" aria-hidden="true"></span>
            <span class="conversation-status-label">在线</span>
          </div>
          <button
            id="activity-panel-toggle"
            class="panel-toggle panel-toggle--right"
            type="button"
            aria-controls="activity-panel"
            aria-expanded="false"
          >
            <span class="panel-toggle-label">活动/任务</span>
            <span class="panel-toggle-icon" aria-hidden="true">›</span>
          </button>
        </div>
        <div id="conversation-scroll" class="panel-scroll-body">
          <div id="conversation-body"></div>
        </div>
        <div id="conversation-nav" class="conversation-nav-slot"></div>
        <div class="session-dock">
          <section id="session-dock-plan-summary" class="session-dock-plan-summary" hidden></section>
          <form id="composer" class="session-dock-composer">
            <div class="composer-card">
              <div class="composer-collapse-content">
                <div id="composer-attachments" class="composer-attachments" hidden></div>
                <textarea id="composer-input" rows="1" placeholder="输入下一步请求"></textarea>
                <p id="composer-attachment-error" class="composer-attachment-error" hidden></p>
                <p id="composer-inline-feedback" class="composer-inline-feedback" hidden></p>
                <div class="composer-action-row">
                  <div class="composer-action-row-start">
                    <button
                      type="button"
                      id="composer-upload-file"
                      class="composer-attach-trigger"
                      data-composer-attach-trigger="true"
                      aria-label="添加附件"
                      aria-expanded="false"
                    >
                      +
                    </button>
                    <div id="composer-attachment-menu" class="composer-attachment-menu" hidden>
                      <button type="button" id="composer-upload-file-action">上传文件</button>
                      <button type="button" id="composer-upload-image">上传图片</button>
                    </div>
                    <input id="composer-file-input" type="file" multiple hidden />
                    <input id="composer-image-input" type="file" accept="image/*" multiple hidden />
                  </div>
                  <div class="composer-actions">
                    <button type="button" id="rewrite-last-question-button" hidden>重写上个问题</button>
                    <button type="submit" id="send-button">发送</button>
                    <button type="button" id="interrupt-button">中断</button>
                  </div>
                </div>
                <div class="composer-footer">
                  <div id="approval-mode-controls" class="approval-mode-controls-slot"></div>
                  <label class="composer-nav-toggle composer-nav-toggle--subtle" title="显示导航跳转按钮">
                    <input id="conversation-nav-toggle" type="checkbox" checked />
                    <span class="sr-only">显示导航跳转按钮</span>
                    <span class="composer-nav-toggle-icon" aria-hidden="true"></span>
                  </label>
                </div>
              </div>
              <div class="composer-collapse-row">
                <button type="button" id="composer-collapse-toggle" data-collapsed="false">压缩底栏</button>
              </div>
            </div>
          </form>
        </div>
      </section>
      <div
        id="activity-panel-resizer"
        class="panel-resizer"
        role="separator"
        aria-label="调整活动宽度"
        aria-orientation="vertical"
        hidden
      ></div>
      <aside id="activity-panel" class="panel panel-scroll" hidden></aside>
    </main>
    <div id="auth-gate" class="auth-gate" hidden>
      <form id="login-form" class="auth-card">
        <div class="auth-card-header">
          <div>
            <div class="auth-card-eyebrow">访问控制</div>
            <h2 class="auth-card-title">输入共享密码</h2>
          </div>
          <button
            id="auth-theme-toggle"
            class="auth-theme-toggle"
            type="button"
            data-theme-toggle="true"
            aria-label="切换到暗色主题"
            title="切换到暗色主题"
          >
            <span class="auth-theme-toggle-icon" aria-hidden="true">☾</span>
          </button>
        </div>
        <p class="auth-card-copy">登录后即可继续查看项目、会话和流式活动。</p>
        <label class="auth-field">
          <span>共享密码</span>
          <input
            id="login-password"
            class="auth-input"
            type="password"
            name="password"
            autocomplete="current-password"
            placeholder="请输入共享密码"
          />
        </label>
        <p id="login-error" class="auth-error" hidden></p>
        <div class="auth-actions">
          <button id="login-button" class="dialog-button dialog-button--primary auth-submit" type="submit">登录</button>
        </div>
      </form>
    </div>
    <dialog id="mobile-drawer" class="mobile-drawer-frame"></dialog>
    <dialog id="history-dialog" class="history-dialog-frame"></dialog>
    <dialog id="file-preview-dialog" class="file-preview-dialog-frame"></dialog>
    <dialog id="project-dialog" class="project-dialog-frame"></dialog>
    <dialog id="rename-dialog" class="project-dialog-frame">
      <form id="rename-dialog-form" class="project-dialog-shell">
        <div class="dialog-header">
          <div>
            <div class="dialog-eyebrow">重命名会话</div>
            <h2 class="dialog-title" id="rename-dialog-session-title">当前会话</h2>
          </div>
          <button class="history-dialog-close" type="button" data-rename-dialog-close="true" aria-label="关闭">×</button>
        </div>
        <label class="dialog-field">
          <span>会话名称</span>
          <input
            id="rename-dialog-input"
            class="dialog-input"
            type="text"
            name="sessionName"
            placeholder="输入新的会话名称"
            autocomplete="off"
          />
        </label>
        <div class="dialog-actions">
          <button class="dialog-button" type="button" data-rename-dialog-close="true">取消</button>
          <button class="dialog-button dialog-button--primary" type="submit">保存名称</button>
        </div>
      </form>
    </dialog>
    <dialog id="rewrite-dialog" class="project-dialog-frame">
      <form id="rewrite-dialog-form" class="project-dialog-shell">
        <div class="dialog-header">
          <div>
            <div class="dialog-eyebrow">重写上个问题</div>
            <h2 class="dialog-title" id="rewrite-dialog-session-title">当前会话</h2>
          </div>
          <button class="history-dialog-close" type="button" data-rewrite-dialog-close="true" aria-label="关闭">×</button>
        </div>
        <label class="dialog-field">
          <span>编辑后的问题</span>
          <textarea
            id="rewrite-dialog-input"
            class="dialog-input dialog-input--multiline"
            name="rewrittenQuestion"
            rows="8"
            placeholder="输入编辑后的问题"
          ></textarea>
        </label>
        <div class="dialog-actions">
          <button class="dialog-button" type="button" data-rewrite-dialog-close="true">取消</button>
          <button class="dialog-button dialog-button--primary" type="submit">新开分支重跑</button>
        </div>
      </form>
    </dialog>
    <script src="/vendor/markdown-it.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
